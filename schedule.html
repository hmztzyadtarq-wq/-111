<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول التحديات | معسكر العشرة الأوائل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-main: #020617; --card-bg: #0f172a; --border-color: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8; --accent-pink: #ec4899;
            --luxury-gradient: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, -apple-system, sans-serif; margin: 0; display: flex; }
        
        .sidebar {
            width: 260px; background: var(--card-bg); height: 100vh; position: fixed;
            right: 0; top: 0; border-left: 1px solid var(--border-color); padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between; z-index: 100;
        }
        .sidebar-brand { font-size: 18px; font-weight: bold; color: var(--accent-pink); text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; color: var(--text-main); text-decoration: none; padding: 12px 15px; border-radius: 10px; font-weight: bold; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(236, 72, 153, 0.15); color: var(--accent-pink); }
        .user-badge { background: var(--bg-main); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); font-weight: bold; }
        
        .main-content { margin-right: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        
        .direct-add-box { background: var(--card-bg); border: 2px solid var(--accent-pink); padding: 20px; border-radius: 16px; margin-bottom: 30px; }
        .inputs-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        input[type="text"], select { flex: 1; min-width: 180px; padding: 12px; border-radius: 8px; background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border-color); font-weight: bold; }
        .add-btn { background: var(--luxury-gradient); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .grid-days-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .day-battle-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        
        .task-item-battle { background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .task-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .task-subject { font-size: 11px; font-weight: bold; background: rgba(236, 72, 153, 0.1); color: var(--accent-pink); padding: 2px 6px; border-radius: 6px; }
        .battle-buttons-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .btn-vs-user { padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-muted); font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-vs-user.tarek-success { background: rgba(236, 72, 153, 0.2); color: var(--accent-pink); border-color: var(--accent-pink); }
        .btn-vs-user.hazem-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border-color: #10b981; }
        .btn-vs-user:disabled { opacity: 0.35; cursor: not-allowed; }
        .del-btn { background: none; border: none; color: #ef4444; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div>
            <div class="sidebar-brand">🏆 معسكر الـ 10 أوائل</div>
            <div class="sidebar-menu">
                <a href="index.html" class="sidebar-link">🏠 لوحة التحكم الرئيسية</a>
                <a href="schedule.html" class="sidebar-link active">📅 جدول التحديات اليومي</a>
                <a href="materials.html" class="sidebar-link">📚 الكتب والمذكرات PDF</a>
                <a href="summary.html" class="sidebar-link">📊 إحصائيات الإنجاز</a>
                <a href="settings.html" class="sidebar-link">⚙️ إعدادات المنصة</a>
            </div>
        </div>
        <div class="user-badge">👤 البطل: <span id="userLabel" style="color: #10b981;">..</span></div>
    </nav>

    <main class="main-content">
        <section class="direct-add-box">
            <h3 style="margin: 0;">⚡ إضافة تحدي جديد في سرفر المعسكر المشترك:</h3>
            <div class="inputs-group">
                <select id="targetDaySelect">
                    <option value="1">🌅 اليوم الأول</option> <option value="2">🌅 اليوم الثاني</option>
                    <option value="3" selected>🔥 اليوم الثالث</option> <option value="4">🌅 اليوم الرابع</option>
                </select>
                <select id="subjectSelect">
                    <option value="كيمياء">🧪 كيمياء</option> <option value="فيزياء">⚡ فيزياء</option>
                    <option value="أحياء">🧬 أحياء</option> <option value="لغة عربية">✒️ لغة عربية</option>
                </select>
                <input type="text" id="taskNameInput" placeholder="اكتب اسم الدرس المتراكم فوراً...">
                <button class="add-btn" onclick="addNewTaskToServer()">تنزيل في الساحة 🚀</button>
            </div>
        </section>

        <div class="grid-days-container" id="gridDaysContainer"></div>
    </main>

    <script>
        const activeUser = sessionStorage.getItem('active_camp_user');
        if(!activeUser) { window.location.href = "login.html"; }
        document.getElementById('userLabel').innerText = activeUser;

        // تهيئة الـ Firebase Live Server لحفظ الدروس ومزامنتها تلقائياً بالثانية
        const firebaseConfig = { databaseURL: "https://camp-top10-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function addNewTaskToServer() {
            const day = parseInt(document.getElementById('targetDaySelect').value);
            const subject = document.getElementById('subjectSelect').value;
            const name = document.getElementById('taskNameInput').value.trim();
            if(!name) return alert("اكتب اسم الدرس!");

            const newTaskRef = db.ref('camp_tasks').push();
            newTaskRef.set({ id: newTaskRef.key, day: day, subject: subject, name: name, meDone: false, hazemDone: false });
            document.getElementById('taskNameInput').value = '';
        }

        db.ref('camp_tasks').on('value', (snapshot) => {
            const container = document.getElementById('gridDaysContainer');
            container.innerHTML = '';
            let tasks = [];
            snapshot.forEach(child => { tasks.push(child.val()); });

            for(let d=1; d<=4; d++) {
                const dayTasks = tasks.filter(t => t.day === d);
                const card = document.createElement('div');
                card.className = "day-battle-card";
                card.innerHTML = `<h3>🌅 اليوم ${d}</h3><div id="day-box-${d}"></div>`;
                container.appendChild(card);

                const box = document.getElementById(`day-box-${d}`);
                if(dayTasks.length === 0) { box.innerHTML = "<p style='color:var(--text-muted); font-size:12px;'>لا توجد دروس مضافة.</p>"; }
                
                dayTasks.forEach(task => {
                    const tDisabled = activeUser !== 'طارق' ? 'disabled' : '';
                    const hDisabled = activeUser !== 'حازم' ? 'disabled' : '';
                    
                    const item = document.createElement('div');
                    item.className = "task-item-battle";
                    item.innerHTML = `
                        <div class="task-meta">
                            <span class="task-subject">${task.subject}</span>
                            <strong>${task.name}</strong>
                            <button class="del-btn" onclick="deleteTask('${task.id}')">🗑️</button>
                        </div>
                        <div class="battle-buttons-zone">
                            <button class="btn-vs-user ${task.meDone?'tarek-success':''}" ${tDisabled} onclick="toggleTask('${task.id}', 'tarek', ${task.meDone})">طارق: ${task.meDone?'✅':'⏳'}</button>
                            <button class="btn-vs-user ${task.hazemDone?'hazem-success':''}" ${hDisabled} onclick="toggleTask('${task.id}', 'hazem', ${task.hazemDone})">حازم: ${task.hazemDone?'✅':'⏳'}</button>
                        </div>
                    `;
                    box.appendChild(item);
                });
            }
        });

        function toggleTask(id, user, status) {
            if(user === 'tarek') db.ref('camp_tasks/' + id).update({ meDone: !status });
            if(user === 'hazem') db.ref('camp_tasks/' + id).update({ hazemDone: !status });
        }
        function deleteTask(id) { if(confirm("مسح نهائي؟")) db.ref('camp_tasks/' + id).remove(); }
    </script>
</body>
</html>
