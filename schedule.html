<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة مراجعة معسكر العشرة الأوائل</title>
    <style>
        /* نظام الألوان الديناميكي المتغير بين الفاتح والغامق */
        :root {
            --bg-main: #020617;
            --card-bg: #0f172a;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-pink: #ec4899;
            --accent-glow: rgba(236, 72, 153, 0.25);
            --luxury-gradient: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-pink: #db2777;
            --accent-glow: rgba(219, 39, 119, 0.15);
            --luxury-gradient: linear-gradient(135deg, #db2777 0%, #7c3aed 100%);
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        header { background: var(--card-bg); padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        h1 { margin: 0; font-size: 20px; }
        
        .user-status-zone { display: flex; align-items: center; gap: 15px; }
        .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        .direct-add-box { 
            background: var(--card-bg); 
            border: 2px solid var(--accent-pink); 
            padding: 20px; border-radius: 16px; margin: 20px auto; max-width: 1160px;
            box-shadow: 0 4px 20px var(--accent-glow); 
        }
        .inputs-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        input[type="text"], select { 
            flex: 1; min-width: 180px; padding: 12px; border-radius: 8px; 
            background: var(--bg-main); color: var(--text-main); 
            border: 1px solid var(--border-color); font-weight: bold; 
        }
        .add-btn { background: var(--luxury-gradient); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .add-btn:hover { transform: scale(1.02); }

        .grid-days-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; margin: 20px auto; max-width: 1200px; padding: 0 15px;
        }

        .day-battle-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 16px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.3s;
        }
        .day-battle-card.current-day-light { border-color: var(--accent-pink); box-shadow: 0 0 15px var(--accent-glow); }
        
        .day-title-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }
        .day-name { font-size: 18px; font-weight: bold; }
        .current-tag { background: var(--accent-pink); color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }

        .task-item-battle {
            background: var(--bg-main); border: 1px solid var(--border-color);
            padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px;
        }
        .task-meta { display: flex; justify-content: space-between; align-items: center; }
        .task-subject { font-size: 11px; font-weight: bold; background: rgba(236, 72, 153, 0.1); color: var(--accent-pink); padding: 2px 6px; border-radius: 6px; }
        .task-text { font-size: 14px; font-weight: bold; color: var(--text-main); flex: 1; margin-right: 8px; text-align: right; }

        .battle-buttons-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-vs-user { padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-muted); font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s; }
        
        .btn-vs-user.tarek-success { background: rgba(236, 72, 153, 0.2); color: var(--accent-pink); border-color: var(--accent-pink); box-shadow: 0 0 8px var(--accent-glow); }
        .btn-vs-user.hazem-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border-color: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.2); }

        .del-icon-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; }
        .progress-summary-text { font-size: 12px; font-weight: bold; color: var(--text-muted); margin-top: 10px; display: flex; justify-content: space-between; }
        .theme-toggle-btn { background-color: var(--accent-pink); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>🏆 ساحة معسكر العشرة الأوائل (تحديث تلقائي لايف)</h1>
        <div class="user-status-zone">
            <div><span class="status-dot"></span> <span id="syncStatus">متصل تلقائياً بالسيرفر السريع</span></div>
            <button onclick="toggleTheme()" class="theme-toggle-btn" id="themeBtn">المود الفاتح ☀️</button>
        </div>
    </header>

    <main>
        <!-- لوحة الإدخال الفورية -->
        <section class="direct-add-box">
            <h3 style="color: var(--text-main); margin: 0;">⚡ إضافة درس وتحدي جديد في الساحة حالاً:</h3>
            <div class="inputs-group">
                <select id="targetDaySelect">
                    <option value="1">🌅 الجدول لليوم الأول</option>
                    <option value="2">🌅 الجدول لليوم الثاني</option>
                    <option value="3" selected>🔥 الجدول لليوم الثالث (اليوم الحالي)</option>
                    <option value="4">🌅 الجدول لليوم الرابع</option>
                    <option value="5">🌅 الجدول لليوم الخامس</option>
                    <option value="6">🌅 الجدول لليوم السادس</option>
                    <option value="7">🌅 الجدول لليوم السابع</option>
                    <option value="8">🌅 الجدول لليوم الثامن</option>
                    <option value="9">🌅 الجدول لليوم التاسع</option>
                    <option value="10">🌅 الجدول لليوم العاشر</option>
                </select>
                <select id="subjectSelect">
                    <option value="كيمياء">🧪 كيمياء</option>
                    <option value="فيزياء">⚡ فيزياء</option>
                    <option value="أحياء">🧬 أحياء</option>
                    <option value="لغة عربية">✒️ لغة عربية</option>
                    <option value="إنجليزي">🇬🇧 إنجليزي</option>
                    <option value="جيولوجيا">⛰️ جيولوجيا</option>
                </select>
                <input type="text" id="taskNameInput" placeholder="اكتب المادة والدرس المتراكم فورا...">
                <button class="add-btn" onclick="addNewLiveTask()">تنزيل في الساحة فوراً 🚀</button>
            </div>
        </section>

        <div class="grid-days-container" id="gridDaysContainer"></div>
    </main>

    <script>
        // سيرفر تزامني جديد فائق السرعة ومفتوح لضمان الإرسال والاستقبال التلقائي
        const AUTO_SERVER_URL = "https://kvdb.io/MN9vGShNq1gZ88Yf8A87gq/camp_tasks";
        let databaseState = { tasks: [] };
        
        // الكود هنا بيكتشف تلقائياً إنت مين بناءً على اللينك أو بيحط "tarek" كديفولت
        let currentUserRole = "tarek";
        if(window.location.href.includes("hazem")) {
            currentUserRole = "hazem";
        }

        window.onload = function() {
            applySavedTheme();
            loadDataFromServer();
            // مزامنة حية وتلقائية بالملي ثانية كل 3 ثوانٍ بدون أي تدبيج يدوي
            setInterval(loadDataFromServer, 3000);
        };

        function loadDataFromServer() {
            fetch(AUTO_SERVER_URL)
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                if (data && data.tasks) {
                    databaseState = data;
                    renderGridStructure();
                    document.getElementById('syncStatus').innerText = `متصل تلقائياً (${currentUserRole === 'tarek' ? 'طارق' : 'حازم'})`;
                }
            })
            .catch(e => {
                console.log("إعادة محاولة المزامنة التلقائية...");
            });
        }

        function saveDataToServer() {
            // رندر الشاشة عندك الأول فوراً علشان تحس بالسرعة
            renderGridStructure();

            fetch(AUTO_SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(databaseState)
            })
            .then(() => {
                console.log("تمت المزامنة التلقائية بنجاح.");
            })
            .catch(e => console.log("خطأ مؤقت في الشبكة.. جاري المحاولة"));
        }

        function getCalculatedCurrentDay() {
            let campStartDate = localStorage.getItem('campTenDaysStartDate');
            if (!campStartDate) {
                const date = new Date(); date.setDate(date.getDate() - 1);
                localStorage.setItem('campTenDaysStartDate', date.toISOString());
                campStartDate = date.toISOString();
            }
            let day = Math.floor((new Date() - new Date(campStartDate)) / (24*60*60*1000)) + 1;
            if(day < 1) day = 1; if(day > 10) day = 10;
            return day;
        }

        function renderGridStructure() {
            const container = document.getElementById('gridDaysContainer');
            if (!container) return;
            container.innerHTML = '';

            const allTasks = databaseState.tasks || [];
            const currentActiveDayNum = getCalculatedCurrentDay();

            for (let dayNum = 1; dayNum <= 10; dayNum++) {
                const dayTasks = allTasks.map((t, idx) => ({...t, originalIdx: idx})).filter(t => t.day === dayNum);
                
                const total = dayTasks.length;
                const tDone = dayTasks.filter(t => t.meDone).length;
                const hDone = dayTasks.filter(t => t.hazemDone).length;

                const card = document.createElement('div');
                card.className = `day-battle-card ${dayNum === currentActiveDayNum ? 'current-day-light' : ''}`;

                let isCurrentBadge = dayNum === currentActiveDayNum ? '<span class="current-tag">اليوم الحالي 🔥</span>' : '';

                let tasksHtml = '';
                if(dayTasks.length === 0) {
                    tasksHtml = `<div style="color: var(--text-muted); text-align:center; padding:20px; font-size:12px; border:1px dashed var(--border-color); border-radius:8px;">لا يوجد دروس مضافة اليوم.</div>`;
                } else {
                    dayTasks.forEach(task => {
                        const tBtnClass = task.meDone ? "btn-vs-user tarek-success" : "btn-vs-user";
                        const tBtnText = task.meDone ? "طارق: ✅ تم" : "طارق: ⏳ شغال";

                        const hBtnClass = task.hazemDone ? "btn-vs-user hazem-success" : "btn-vs-user";
                        const hBtnText = task.hazemDone ? "حازم: ✅ تم" : "حازم: ⏳ شغال";

                        tasksHtml += `
                            <div class="task-item-battle">
                                <div class="task-meta">
                                    <span class="task-subject">${task.subject}</span>
                                    <span class="task-text">${task.name}</span>
                                    <button class="del-icon-btn" onclick="deleteLiveTask(${task.originalIdx})">🗑️</button>
                                </div>
                                <div class="battle-buttons-zone">
                                    <button class="${tBtnClass}" onclick="toggleLiveTask(${task.originalIdx}, 'tarek')">${tBtnText}</button>
                                    <button class="${hBtnClass}" onclick="toggleLiveTask(${task.originalIdx}, 'hazem')">${hBtnText}</button>
                                </div>
                            </div>
                        `;
                    });
                }

                card.innerHTML = `
                    <div>
                        <div class="day-title-area">
                            <div class="day-name">🌅 اليوم ${dayNum}</div>
                            ${isCurrentBadge}
                        </div>
                        <div style="margin-bottom:10px;">${tasksHtml}</div>
                    </div>
                    <div class="progress-summary-text">
                        <span>📊 طارق: ${tDone}/${total}</span>
                        <span>📊 حازم: ${hDone}/${total}</span>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function addNewLiveTask() {
            const daySelect = document.getElementById('targetDaySelect');
            const subjectSelect = document.getElementById('subjectSelect');
            const nameInput = document.getElementById('taskNameInput');

            if(!nameInput.value.trim()) { alert('فضلاً اكتب اسم المادة والدرس أولاً!'); return; }

            databaseState.tasks.push({
                day: parseInt(daySelect.value),
                subject: subjectSelect.value,
                name: nameInput.value.trim(),
                meDone: false,
                hazemDone: false
            });

            saveDataToServer();
            nameInput.value = '';
        }

        function toggleLiveTask(originalIdx, user) {
            const task = databaseState.tasks[originalIdx];
            if(task) {
                // الكود بيكتشف تلقائياً المتصفح الحالي ويسمح له بالتعديل على دوره فقط لنزاهة التحدي
                if(user === 'tarek') task.meDone = !task.meDone;
                else task.hazemDone = !task.hazemDone;
                saveDataToServer();
            }
        }

        function deleteLiveTask(originalIdx) {
            if(confirm('هل تود مسح هذا الدرس نهائياً من الساحة؟')) {
                databaseState.tasks.splice(originalIdx, 1);
                saveDataToServer();
            }
        }

        function toggleTheme() {
            if (document.documentElement.getAttribute('data-theme') === 'light') {
                document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'dark');
                document.getElementById('themeBtn').innerText = "المود الفاتح ☀️";
            } else {
                document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light');
                document.getElementById('themeBtn').innerText = "المود الغامق 🌙";
            }
        }
        function applySavedTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.setAttribute('data-theme', 'light'); document.getElementById('themeBtn').innerText = "المود الغامق 🌙";
            }
        }
    </script>
</body>
</html>
