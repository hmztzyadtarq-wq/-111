<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="card" style="width: 300px; text-align: center;">
        <h2>مرحباً بك يا طارق</h2>
        <input type="password" id="pass" placeholder="أدخل كلمة المرور" style="width: 100%; padding: 10px; margin: 10px 0;">
        <button onclick="checkPass()" class="theme-toggle-btn">دخول</button>
    </div>
    <script>
        function checkPass() {
            if(document.getElementById('pass').value === '111') {
                window.location.href = 'index.html';
            } else { alert('كلمة مرور خاطئة!'); }
        }
    </script>
</body>
</html>
