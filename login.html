
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة تحكم التحدي</title>
    <style>
        /* التنسيق المدمج (CSS) */
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --accent-pink: #ec4899;
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            box-sizing: border-box; /* لضمان عدم خروج الإنبوت عن الكارد */
        }
        button {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>✨ لوحة تحكم التحدي</h2>
        <p style="color: #94a3b8; font-size: 14px;">أدخل كلمة المرور للمتابعة</p>
        <input type="password" id="pass" placeholder="كلمة المرور...">
        <button onclick="checkPass()">دخول لوحة التحكم ➔</button>
    </div>

    <script>
        // المنطق المدمج (JS)
        function checkPass() {
            const password = document.getElementById('pass').value;
            
            if (password === '111') {
                // حفظ حالة الدخول
                sessionStorage.setItem('isVerifiedUser', 'true');
                window.location.href = 'index.html';
            } else {
                alert('❌ كلمة المرور غير صحيحة، حاول مجدداً!');
            }
        }

        // جعل زر "Enter" يعمل كزر دخول
        document.getElementById('pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPass();
            }
        });
    </script>
</body>
</html>
