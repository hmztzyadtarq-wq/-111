<div class="card" style="text-align: center;">
    <h2>غرفة البومودورو</h2>
    <div id="timer" style="font-size: 4em; margin: 20px;">25:00</div>
    <button onclick="startTimer()" class="theme-toggle-btn">ابدأ التركيز</button>
</div>
<script>
    let time = 1500;
    function startTimer() {
        setInterval(() => {
            time--;
            document.getElementById('timer').innerText = Math.floor(time/60) + ":" + (time%60);
        }, 1000);
    }
</script>
