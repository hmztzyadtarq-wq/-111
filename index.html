<!-- استخدم الهيكل الموحد السابق وأضف المحتوى التالي داخل المين -->
<div class="card">
    <h2>المواجهة (VS)</h2>
    <div class="vs-container">
        <p>طارق: <progress value="70" max="100"></progress></p>
        <p>حازم: <progress value="65" max="100"></progress></p>
    </div>
</div>
<div class="card">
    <h2>عداد المعسكر</h2>
    <p style="font-size: 2em;">74 يوماً متبقية</p>
</div>
<div class="card">
    <h2>ساعة الحائط</h2>
    <div id="clock" style="font-family: monospace; font-size: 1.5em;">00:00:00</div>
</div>
<script>
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
</script>
