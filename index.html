<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معسكر العشرة الأوائل - البوابة الرئيسية</title>
    <style>
        :root {
            --bg-main: #020617;
            --card-bg: #0f172a;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-pink: #ec4899;
            --luxury-gradient: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container {
            width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center;
        }

        /* ستايل الساعة الرقمية المودرن */
        .clock-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 16px; margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .clock-time { font-size: 38px; font-weight: 900; color: var(--accent-pink); letter-spacing: 1px; }
        .clock-date { font-size: 14px; color: var(--text-muted); margin-top: 5px; }

        /* بوابة الدخول الاحترافية */
        .login-box {
            background: var(--card-bg); border: 2px solid var(--border-color);
            padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        .login-box::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: var(--luxury-gradient); border-radius: 20px; z-index: -1; opacity: 0.3;
        }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 22px; color: var(--text-main); }
        
        .input-field {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px;
            background: var(--bg-main); color: var(--text-main);
            border: 1px solid var(--border-color); font-weight: bold; box-sizing: border-box;
            text-align: center; font-size: 16px;
        }
        .input-field:focus { border-color: var(--accent-pink); outline: none; }

        .login-btn {
            width: 100%; background: var(--luxury-gradient); color: white; border: none;
            padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4); }

        /* صندوق بحث جوجل المدمج */
        .google-box {
            margin-top: 30px; background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box;
        }
        .google-form { display: flex; gap: 10px; }
        .google-input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--bg-main); color: var(--text-main); font-size: 14px;
        }
        .google-btn {
            background: #2563eb; color: white; border: none; padding: 0 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الساعة الرقمية المحدثة في ثانية -->
        <div class="clock-card">
            <div class="clock-time" id="liveClock">00:00:00 م</div>
            <div class="clock-date" id="liveDate">جاري تحميل التاريخ...</div>
        </div>

        <!-- البوابة الاحترافية بالباسورد المخفي -->
        <div class="login-box">
            <h2>🏆 تسجيل دخول بطل المعسكر</h2>
            <input type="text" id="phoneInput" class="input-field" placeholder="أدخل رقم الهاتف المسجل">
            <input type="password" id="passInput" class="input-field" placeholder="أدخل كلمة المرور السرية">
            <button class="login-btn" onclick="handleLogin()">تحقق وافتح الساحة فوراً 🚀</button>
        </div>

        <!-- صندوق بحث جوجل المطور ومحمي بروابطه الحقيقية -->
        <div class="google-box">
            <form action="https://www.google.com/search" method="get" target="_blank" class="google-form">
                <input type="text" name="q" class="google-input" placeholder="ابحث في جوجل من داخل المعسكر..." required>
                <button type="submit" class="google-btn">بحث</button>
            </form>
        </div>
    </div>

    <script>
        // التحديث التلقائي للساعة والتاريخ كل ثانية
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            
            document.getElementById('liveClock').innerText = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', calendar: 'islamic-umar' };
            document.getElementById('liveDate').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // قاعدة البيانات الصارمة المرفقة من قبلك
        const USER_CREDENTIALS = {
            "01140090339": { name: "طارق", pass: "1714827128" },
            "01098078492": { name: "حازم", pass: "eesdca32" }
        };

        function handleLogin() {
            const phone = document.getElementById('phoneInput').value.trim();
            const pass = document.getElementById('passInput').value;

            if (USER_CREDENTIALS[phone]) {
                if (pass === USER_CREDENTIALS[phone].pass) {
                    // حفظ جلسة العمل في المتصفح لعدم طلبها مجدداً داخل الجدول
                    sessionStorage.setItem('active_camp_user', USER_CREDENTIALS[phone].name);
                    // الربط المباشر والصحيح بالصفحة التالية لعدم حدوث عطل
                    window.location.href = "schedule.html";
                } else {
                    alert("❌ كلمة المرور المكتوبة غير صحيحة!");
                }
            } else {
                alert("❌ رقم الهاتف هذا غير مسجل في ساحة المعسكر!");
            }
        }

        // إذا كان مسجل دخول بالفعل، ينقله تلقائياً لصفحة الجدول
        if(sessionStorage.getItem('active_camp_user')) {
            window.location.href = "schedule.html";
        }
    </script>
</body>
</html>
